<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Organizer — Results</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="logo">spotify organizer</a>
    <span class="step-indicator">Step 3 / 3</span>
  </nav>

  <div class="container container--medium">
    <!-- Loading state -->
    <div id="loading-view" class="loading-container">
      <div class="spinner"></div>
      <h2>Organizing your music...</h2>
      <ul class="loading-steps">
        <li id="step-fetch" class="active">
          <span class="step-icon">○</span>
          Fetching your top 50 tracks
        </li>
        <li id="step-ai">
          <span class="step-icon">○</span>
          AI is categorizing your tracks
        </li>
        <li id="step-done">
          <span class="step-icon">○</span>
          Done
        </li>
      </ul>
    </div>

    <!-- Results state (hidden initially) -->
    <div id="results-view" style="display: none;">
      <div class="results-header">
        <h1>Your playlists are ready</h1>
        <p class="subtitle">Review the results below, then save them to your Spotify account.</p>
      </div>

      <div id="results-grid" class="results-grid"></div>

      <div id="unassigned-section" class="unassigned-section" style="display: none;">
        <h2>Unassigned tracks</h2>
        <div class="result-playlist">
          <ul id="unassigned-list" class="track-list"></ul>
        </div>
      </div>

      <div class="actions-bar">
        <button type="button" class="btn btn-primary btn-spotify" id="save-btn">
          Save to Spotify
        </button>
        <button type="button" class="btn btn-secondary" id="back-btn" style="width: auto;">
          Start over
        </button>
      </div>

      <div id="status-container"></div>
    </div>

    <!-- Error state (hidden initially) -->
    <div id="error-view" style="display: none;">
      <div class="results-header">
        <h1>Something went wrong</h1>
        <p class="subtitle" id="error-message"></p>
      </div>
      <div class="actions-bar">
        <button type="button" class="btn btn-primary" onclick="window.location.href='index.html'">
          Start over
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createSpotifyClient } from './js/spotify.js';
    import { categorizeTracks } from './js/llm.js';

    // Guard
    const spotifyToken = sessionStorage.getItem('spotify_token');
    const llmKey = sessionStorage.getItem('llm_api_key');
    const userPlaylists = JSON.parse(sessionStorage.getItem('user_playlists') || '[]');

    if (!spotifyToken || !llmKey || !userPlaylists.length) {
      window.location.href = 'index.html';
    }

    const spotify = createSpotifyClient(spotifyToken);

    // UI references
    const loadingView = document.getElementById('loading-view');
    const resultsView = document.getElementById('results-view');
    const errorView = document.getElementById('error-view');
    const stepFetch = document.getElementById('step-fetch');
    const stepAi = document.getElementById('step-ai');
    const stepDone = document.getElementById('step-done');

    function markStep(el, state) {
      el.classList.remove('active', 'done');
      el.classList.add(state);
      el.querySelector('.step-icon').textContent = state === 'done' ? '✓' : state === 'active' ? '◌' : '○';
    }

    function showError(msg) {
      loadingView.style.display = 'none';
      errorView.style.display = 'block';
      document.getElementById('error-message').textContent = msg;
    }

    // Store for saving later
    let allTracks = [];
    let categorized = null;

    async function run() {
      try {
        // Step 1: fetch top tracks
        markStep(stepFetch, 'active');
        allTracks = await spotify.getTopTracks();
        markStep(stepFetch, 'done');

        // Step 2: AI categorization
        markStep(stepAi, 'active');
        categorized = await categorizeTracks(llmKey, userPlaylists, allTracks);
        markStep(stepAi, 'done');

        // Step 3: done
        markStep(stepDone, 'done');

        // Short delay for visual feedback
        await new Promise(r => setTimeout(r, 500));
        renderResults();
      } catch (err) {
        showError(err.message);
      }
    }

    function renderResults() {
      loadingView.style.display = 'none';
      resultsView.style.display = 'block';

      const grid = document.getElementById('results-grid');
      const assignedUris = new Set();

      categorized.playlists.forEach((playlist) => {
        const section = document.createElement('div');
        section.className = 'result-playlist';

        let tracksHtml = '';
        playlist.tracks.forEach((track, i) => {
          assignedUris.add(track.uri);
          tracksHtml += `
            <li class="track-item">
              <span class="track-number">${i + 1}</span>
              <span class="track-name">${escapeHtml(track.name)}</span>
            </li>`;
        });

        section.innerHTML = `
          <div class="result-playlist-header">
            <h2>${escapeHtml(playlist.name)}</h2>
            <span class="track-count">${playlist.tracks.length} tracks</span>
          </div>
          <ul class="track-list">${tracksHtml}</ul>`;

        grid.appendChild(section);
      });

      // Unassigned tracks
      const unassigned = allTracks.filter(t => !assignedUris.has(t.uri));
      if (unassigned.length) {
        document.getElementById('unassigned-section').style.display = 'block';
        const list = document.getElementById('unassigned-list');
        unassigned.forEach((track, i) => {
          list.innerHTML += `
            <li class="track-item">
              <span class="track-number">${i + 1}</span>
              <span class="track-name">${escapeHtml(track.name)}</span>
              <span class="track-artist">${escapeHtml(track.artists.map(a => a.name).join(', '))}</span>
            </li>`;
        });
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Save to Spotify
    document.getElementById('save-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-btn');
      const statusContainer = document.getElementById('status-container');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const userId = await spotify.getUserId();

        for (const playlist of categorized.playlists) {
          if (!playlist.tracks.length) continue;

          const uris = playlist.tracks.map(t => t.uri);
          const userPlaylist = userPlaylists.find(
            p => p.name.toLowerCase() === playlist.name.toLowerCase()
          );
          const description = userPlaylist
            ? [userPlaylist.vibe, userPlaylist.energy ? `Energy: ${userPlaylist.energy}` : '']
                .filter(Boolean).join(' · ')
            : '';

          const created = await spotify.createPlaylist(userId, playlist.name, description);
          await spotify.addTracksToPlaylist(created.id, uris);
        }

        statusContainer.innerHTML = `
          <div class="status-message success">
            All playlists have been created on your Spotify account!
          </div>`;
        btn.textContent = 'Saved!';
      } catch (err) {
        statusContainer.innerHTML = `
          <div class="status-message error">
            Error: ${escapeHtml(err.message)}
          </div>`;
        btn.disabled = false;
        btn.textContent = 'Retry save';
      }
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = 'setup.html';
    });

    // Go
    run();
  </script>
</body>
</html>
